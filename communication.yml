---
# add discord (on debian bullseye, use the .tgz instead of the .deb
- hosts: dev
  tasks:
    - name: Download teams deb
      get_url:
        url: https://go.microsoft.com/fwlink/p/?LinkID=2112886&clcid=0x40c&culture=fr-fr&country=FR
        dest: "/home/{{ ansible_user_id }}/Téléchargements/teams.deb"
      tags: teams
    - name: Install teams
      apt:
        deb: "/home/{{ ansible_user_id }}/Téléchargements/teams.deb"
      tags: teams
    - name: Add an Apt signing key for Signal
      ansible.builtin.apt_key:
        url: https://updates.signal.org/desktop/apt/keys.asc
        state: present
      tags: signal
    - name: "Add Signal repository"
      ansible.builtin.apt_repository:
        repo: deb [arch=amd64 signed-by=/usr/share/keyrings/signal-desktop-keyring.gpg] https://updates.signal.org/desktop/apt xenial main
        filename: signal-xenial.list
        state: present
      tags: signal
    - name: install Signal
      apt:
        pkg:
          - signal-desktop
      tags: signal
  become: yes

- name: Install Slack
  hosts: dev
  become: yes
  tasks:
    - name: Add Slack signing key
      ansible.builtin.apt_key:
        url: https://packagecloud.io/slacktechnologies/slack/gpgkey
        state: present
      tags: slack

    - name: Add Slack repository
      ansible.builtin.apt_repository:
        repo: deb https://packagecloud.io/slacktechnologies/slack/debian/ jessie main
        filename: slack
        state: present
      tags: slack

    - name: Install Slack
      ansible.builtin.apt:
        pkg:
          - slack-desktop
      tags: slack

